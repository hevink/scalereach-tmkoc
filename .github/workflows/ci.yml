name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build verification ──────────────────────────────────────
  build-check:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.19"
      - run: bun install
      - run: bun build src/index.ts --outdir ./dist --target bun
      - run: bun build src/worker.ts --outdir ./dist --target bun

  # ── Deploy Worker → EC2 ─────────────────────────────────────
  deploy-worker:
    name: Deploy Worker to EC2
    runs-on: ubuntu-latest
    needs: [build-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy worker via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            export PATH="/home/ubuntu/.bun/bin:/usr/bin:/usr/local/bin:$PATH"
            cd /opt/scalereach

            # Preserve untracked config files before git reset
            [ -f config/youtube_cookies.txt ] && cp config/youtube_cookies.txt /tmp/youtube_cookies_backup.txt

            # Save current commit for rollback
            PREV_COMMIT=$(git rev-parse HEAD)
            echo "📌 Current commit: $PREV_COMMIT"

            echo "📦 Pulling latest code..."
            git fetch origin
            git checkout main
            git reset --hard origin/main

            # Restore preserved config files
            [ -f /tmp/youtube_cookies_backup.txt ] && cp /tmp/youtube_cookies_backup.txt config/youtube_cookies.txt && echo "🍪 Restored youtube_cookies.txt"

            NEW_COMMIT=$(git rev-parse HEAD)
            echo "🆕 New commit: $NEW_COMMIT"

            echo "📦 Installing dependencies..."
            bun install

            echo "🔄 Reloading worker..."
            pm2 reload ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs
            pm2 save

            echo "🏥 Health check (waiting 15s)..."
            sleep 15
            if curl -sf http://localhost:3002/health | grep -q '"status".*"healthy"'; then
              echo "✅ Deploy successful - $NEW_COMMIT"
              pm2 status
            else
              echo "❌ Health check failed - rolling back to $PREV_COMMIT"
              git checkout main
              git reset --hard $PREV_COMMIT
              bun install
              pm2 reload ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs
              sleep 5
              if curl -sf http://localhost:3002/health | grep -q '"status".*"healthy"'; then
                echo "✅ Rollback successful - running $PREV_COMMIT"
              else
                echo "🚨 Rollback also failed - manual intervention required"
              fi
              exit 1
            fi
